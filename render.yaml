# Render Blueprint — deploy backend Thiên Đức (NestJS + Prisma + PostgreSQL)
# Dùng: Render Dashboard → New → Blueprint → chọn repo thien-duc-website-backend.
# Render tự tạo Postgres + web service, tự nối DATABASE_URL và sinh JWT secret.

databases:
  - name: thien-duc-db
    databaseName: thien_duc
    user: thienduc
    plan: free # Postgres free của Render hết hạn sau 90 ngày — nâng plan khi lên thật.

services:
  - type: web
    name: thien-duc-website-backend
    runtime: node
    plan: free # Free instance ngủ sau 15 phút không request; nâng plan để chạy liên tục.
    region: singapore # gần Việt Nam nhất.
    branch: main
    buildCommand: npm ci && npm run build
    # migrate deploy chạy trước khi start mỗi lần deploy (idempotent, an toàn free tier).
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: thien-duc-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render tự sinh chuỗi ngẫu nhiên an toàn.
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      # Đổi thành domain Vercel thật sau khi có (nhiều origin cách nhau bằng dấu phẩy).
      - key: CORS_ORIGIN
        value: https://thien-duc-website-frontend.vercel.app
      # Cloudinary / SMTP để trống tới khi công ty cung cấp (câu 9, 12 trong docs).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: dautuxaydungthienduc@yahoo.com

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run build

      - run: npm test

  # E2E smoke (task →8): Postgres dùng một lần trong CI — credentials bên dưới
  # là giá trị vứt đi của service container, KHÔNG phải secret production.
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: thienduc_ci
          POSTGRES_PASSWORD: thienduc_ci
          POSTGRES_DB: thien_duc_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U thienduc_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://thienduc_ci:thienduc_ci@localhost:5432/thien_duc_e2e?schema=public
      JWT_ACCESS_SECRET: e2e-only-secret-not-used-anywhere-else
      ADMIN_EMAIL: e2e-admin@example.com
      ADMIN_PASSWORD: e2e-password-123
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run prisma:seed

      - run: npm run test:e2e

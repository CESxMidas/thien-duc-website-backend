services:
  db:
    image: postgres:18-alpine
    container_name: thien-duc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: thienduc
      POSTGRES_PASSWORD: thienduc_dev
      POSTGRES_DB: thien_duc
    ports:
      # 5433 vì máy dev có sẵn PostgreSQL Windows chiếm 5432
      - '5433:5432'
    volumes:
      # Postgres 18+ đổi quy ước: mount ở /var/lib/postgresql (không phải /data)
      - pgdata:/var/lib/postgresql

volumes:
  pgdata:

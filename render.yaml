# Render Blueprint — deploy backend Thiên Đức (NestJS + Prisma + PostgreSQL)
# Dùng: Render Dashboard → New → Blueprint → chọn repo thien-duc-website-backend.
# Render tự tạo Postgres + web service, tự nối DATABASE_URL và sinh JWT secret.

databases:
  - name: thien-duc-db
    databaseName: thien_duc
    user: thienduc
    # Plan Postgres trả phí rẻ nhất có lưu trữ bền + backup được quản lý. Free tier
    # hết hạn 90 ngày và KHÔNG có backup (task →2). `basic-256mb` là tên plan tại
    # thời điểm viết — PHẢI kiểm tra lại tên/giá/retention/PITR ở Render Dashboard
    # khi nâng (Render đổi tên plan theo thời gian). Xem docs/07-deployment/backup-and-restore.md.
    # LƯU Ý: đổi dòng này KHÔNG tự thanh toán; free→paid có thể phải tạo instance
    # Postgres mới + migrate dữ liệu (pg_dump/pg_restore) nếu Render không cho nâng
    # tại chỗ — xem "Đường di trú" trong backup-and-restore.md.
    plan: basic-256mb
    region: singapore # PHẢI cùng region với web service, nếu không hostname nội bộ không kết nối được (P1001).

services:
  - type: web
    name: thien-duc-website-backend
    runtime: node
    # Web service trả phí always-on (không ngủ) — bỏ cold start ~30–50s làm timeout
    # form liên hệ và làm cron đăng bài chạy đáng tin (task →2). `starter` là tên
    # plan tại thời điểm viết — kiểm tra lại tên/giá ở Render Dashboard khi nâng.
    # Đổi dòng này KHÔNG tự thanh toán; cần xác nhận + gắn thẻ ở Dashboard.
    plan: starter
    region: singapore # gần Việt Nam nhất.
    branch: main
    buildCommand: npm ci && npm run build
    # migrate deploy chạy trước khi start mỗi lần deploy (idempotent, an toàn free tier).
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: thien-duc-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render tự sinh chuỗi ngẫu nhiên an toàn.
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      # Đổi thành domain Vercel thật sau khi có (nhiều origin cách nhau bằng dấu phẩy).
      - key: CORS_ORIGIN
        value: https://thien-duc-website-frontend.vercel.app
      # Cloudinary / SMTP để trống tới khi công ty cung cấp (câu 9, 12 trong docs).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: dautuxaydungthienduc@yahoo.com
      # Nơi nhận email báo lead mới. Bỏ trống → gửi về chính SMTP_FROM.
      - key: CONTACT_NOTIFY_TO
        sync: false
      # Sentry DSN (project backend riêng) — nhập tay ở Dashboard. Thiếu = tắt
      # error tracking, app vẫn chạy. Xem docs/07-deployment/monitoring-and-alerting.md.
      - key: SENTRY_DSN
        sync: false
